    - data:
        code: "from typing import Any, Dict, List\nimport json\n\n\ndef main(llm_text: Any) -> dict:\n    def to_float(value: Any, default: float) -> float:\n        try:\n            if isinstance(value, bool):\n                return default\n            return float(value)\n        except (TypeError, ValueError):\n            return default\n\n    def to_int(value: Any, default: int) -> int:\n        try:\n            if isinstance(value, bool):\n                return default\n            return int(value)\n        except (TypeError, ValueError):\n            return default\n\n    if not llm_text:\n        edit_plan = {\n            \"title\": \"默认视频剪辑方案\",\n            \"aspect_ratio\": \"9:16\",\n            \"duration_seconds\": 15,\n            \"timeline\": [],\n            \"warnings\": [\"输入文本为空，返回默认方案\"]\n        }\n        return {\n            \"script_json_Object\": edit_plan\n        }\n\n    data = llm_text\n    if isinstance(llm_text, str):\n        try:\n            data = json.loads(llm_text)\n        except json.JSONDecodeError:\n            data = {}\n\n    if not isinstance(data, dict):\n        data = {}\n\n    title = data.get(\"title\") or \"未命名营销视频\"\n    aspect_ratio = data.get(\"aspect_ratio\") or \"9:16\"\n    timeline = data.get(\"timeline\") or []\n    if not isinstance(timeline, list):\n        timeline = []\n\n    cleaned_timeline: List[Dict[str, Any]] = []\n    for i, scene in enumerate(timeline):\n        if not isinstance(scene, dict):\n            continue\n\n        op = scene.get(\"operation\") or {}\n        if not isinstance(op, dict):\n            op = {}\n\n        cleaned_op = {\n            \"speed\": to_float(op.get(\"speed\"), 1.0),\n            \"crop_mode\": str(op.get(\"crop_mode\") or \"center_crop\"),\n            \"mute_audio\": bool(op.get(\"mute_audio\", False))\n        }\n\n        cleaned_timeline.append({\n            \"scene_id\": to_int(scene.get(\"scene_id\"), i + 1),\n            \"asset_id\": str(scene.get(\"asset_id\") or \"\"),\n            \"source_start\": to_float(scene.get(\"source_start\"), 0.0),\n            \"source_end\": to_float(scene.get(\"source_end\"), 5.0),\n            \"start_time\": to_float(scene.get(\"start_time\"), 0.0),\n            \"end_time\": to_float(scene.get(\"end_time\"), 5.0),\n            \"subtitle\": str(scene.get(\"subtitle\") or \"\"),\n            \"voiceover\": str(scene.get(\"voiceover\") or \"\"),\n            \"operation\": cleaned_op\n        })\n\n    duration_seconds = to_int(data.get(\"duration_seconds\"), 0)\n    if duration_seconds <= 0:\n        if cleaned_timeline:\n            duration_seconds = int(round(cleaned_timeline[-1][\"end_time\"]))\n        else:\n            duration_seconds = 15\n\n    edit_plan = {\n        \"title\": str(title),\n        \"aspect_ratio\": str(aspect_ratio),\n        \"duration_seconds\": duration_seconds,\n        \"timeline\": cleaned_timeline,\n        \"warnings\": data.get(\"warnings\") or []\n    }\n\n    return {\n        \"script_json_Object\": edit_plan\n    }"
